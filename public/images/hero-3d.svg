<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#040c1e"/>
      <stop offset="45%"  stop-color="#071535"/>
      <stop offset="100%" stop-color="#0a2050"/>
    </linearGradient>
    <linearGradient id="glowLeft" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#1d4ed8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowRight" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%"   stop-color="#0ea5e9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="65%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#1e40af" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#040c1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotLeft" cx="20%" cy="60%" r="30%">
      <stop offset="0%"   stop-color="#0369a1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#040c1e" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur12">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Ambient glow layers -->
  <rect width="1920" height="1080" fill="url(#centerGlow)"/>
  <rect width="1920" height="1080" fill="url(#spotLeft)"/>
  <rect x="800" y="0" width="1120" height="1080" fill="url(#glowRight)" opacity="0.6"/>
  <rect x="0" y="0" width="600" height="1080" fill="url(#glowLeft)" opacity="0.4"/>

  <!-- Fine grid -->
  <g stroke="#38bdf8" stroke-width="0.4" opacity="0.06">
    <line x1="0" y1="60"  x2="1920" y2="60"/>
    <line x1="0" y1="120" x2="1920" y2="120"/>
    <line x1="0" y1="180" x2="1920" y2="180"/>
    <line x1="0" y1="240" x2="1920" y2="240"/>
    <line x1="0" y1="300" x2="1920" y2="300"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="420" x2="1920" y2="420"/>
    <line x1="0" y1="480" x2="1920" y2="480"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="660" x2="1920" y2="660"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="780" x2="1920" y2="780"/>
    <line x1="0" y1="840" x2="1920" y2="840"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="0" y1="960" x2="1920" y2="960"/>
    <line x1="0" y1="1020" x2="1920" y2="1020"/>
    <line x1="60"   y1="0" x2="60"   y2="1080"/>
    <line x1="120"  y1="0" x2="120"  y2="1080"/>
    <line x1="180"  y1="0" x2="180"  y2="1080"/>
    <line x1="240"  y1="0" x2="240"  y2="1080"/>
    <line x1="300"  y1="0" x2="300"  y2="1080"/>
    <line x1="360"  y1="0" x2="360"  y2="1080"/>
    <line x1="420"  y1="0" x2="420"  y2="1080"/>
    <line x1="480"  y1="0" x2="480"  y2="1080"/>
    <line x1="540"  y1="0" x2="540"  y2="1080"/>
    <line x1="600"  y1="0" x2="600"  y2="1080"/>
    <line x1="660"  y1="0" x2="660"  y2="1080"/>
    <line x1="720"  y1="0" x2="720"  y2="1080"/>
    <line x1="780"  y1="0" x2="780"  y2="1080"/>
    <line x1="840"  y1="0" x2="840"  y2="1080"/>
    <line x1="900"  y1="0" x2="900"  y2="1080"/>
    <line x1="960"  y1="0" x2="960"  y2="1080"/>
    <line x1="1020" y1="0" x2="1020" y2="1080"/>
    <line x1="1080" y1="0" x2="1080" y2="1080"/>
    <line x1="1140" y1="0" x2="1140" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/>
    <line x1="1260" y1="0" x2="1260" y2="1080"/>
    <line x1="1320" y1="0" x2="1320" y2="1080"/>
    <line x1="1380" y1="0" x2="1380" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1500" y1="0" x2="1500" y2="1080"/>
    <line x1="1560" y1="0" x2="1560" y2="1080"/>
    <line x1="1620" y1="0" x2="1620" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
    <line x1="1740" y1="0" x2="1740" y2="1080"/>
    <line x1="1800" y1="0" x2="1800" y2="1080"/>
    <line x1="1860" y1="0" x2="1860" y2="1080"/>
  </g>

  <!-- Abstract HVAC unit — central box structure -->
  <g opacity="0.22" filter="url(#blur2)">
    <!-- Main unit body -->
    <rect x="980" y="280" width="580" height="380" rx="4" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <rect x="1000" y="300" width="540" height="340" rx="2" fill="#0f2050" stroke="#60a5fa" stroke-width="0.8" opacity="0.6"/>
    <!-- Internal panels -->
    <line x1="1160" y1="300" x2="1160" y2="640" stroke="#38bdf8" stroke-width="0.8"/>
    <line x1="1380" y1="300" x2="1380" y2="640" stroke="#38bdf8" stroke-width="0.8"/>
    <!-- Fan circles -->
    <circle cx="1080" cy="470" r="60" fill="none" stroke="#7dd3fc" stroke-width="1.2"/>
    <circle cx="1080" cy="470" r="44" fill="none" stroke="#38bdf8" stroke-width="0.6"/>
    <circle cx="1080" cy="470" r="8"  fill="#7dd3fc" opacity="0.5"/>
    <line x1="1080" y1="410" x2="1080" y2="530" stroke="#7dd3fc" stroke-width="0.8"/>
    <line x1="1020" y1="470" x2="1140" y2="470" stroke="#7dd3fc" stroke-width="0.8"/>
    <line x1="1037" y1="427" x2="1123" y2="513" stroke="#7dd3fc" stroke-width="0.6"/>
    <line x1="1037" y1="513" x2="1123" y2="427" stroke="#7dd3fc" stroke-width="0.6"/>
    <!-- Control panel right -->
    <rect x="1400" y="320" width="120" height="200" rx="2" fill="none" stroke="#60a5fa" stroke-width="0.8"/>
    <rect x="1412" y="335" width="96"  height="14" rx="1" fill="#1e40af" opacity="0.7"/>
    <rect x="1412" y="358" width="96"  height="14" rx="1" fill="#1e40af" opacity="0.5"/>
    <rect x="1412" y="381" width="96"  height="14" rx="1" fill="#1e40af" opacity="0.5"/>
    <circle cx="1424" cy="430" r="8" fill="none" stroke="#38bdf8" stroke-width="0.8"/>
    <circle cx="1450" cy="430" r="8" fill="none" stroke="#38bdf8" stroke-width="0.8"/>
    <circle cx="1476" cy="430" r="8" fill="#0ea5e9" opacity="0.6"/>
    <!-- Duct pipe top -->
    <rect x="1060" y="220" width="100" height="60" fill="none" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1060" y1="240" x2="1160" y2="240" stroke="#60a5fa" stroke-width="0.6"/>
    <line x1="1060" y1="260" x2="1160" y2="260" stroke="#60a5fa" stroke-width="0.6"/>
    <!-- Duct pipe bottom -->
    <rect x="1060" y="640" width="100" height="60" fill="none" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1060" y1="660" x2="1160" y2="660" stroke="#60a5fa" stroke-width="0.6"/>
    <!-- Pipe connections -->
    <path d="M 800 350 L 980 350" fill="none" stroke="#38bdf8" stroke-width="1.2" stroke-dasharray="6 4"/>
    <path d="M 800 590 L 980 590" fill="none" stroke="#38bdf8" stroke-width="1.2" stroke-dasharray="6 4"/>
    <!-- Data readout lines -->
    <rect x="1200" y="330" width="160" height="8" rx="2" fill="#1d4ed8" opacity="0.5"/>
    <rect x="1200" y="348" width="110" height="8" rx="2" fill="#1d4ed8" opacity="0.35"/>
    <rect x="1200" y="366" width="140" height="8" rx="2" fill="#1d4ed8" opacity="0.4"/>
    <rect x="1200" y="384" width="80"  height="8" rx="2" fill="#1d4ed8" opacity="0.3"/>
  </g>

  <!-- Glowing data nodes -->
  <g filter="url(#blur4)">
    <circle cx="1080" cy="470" r="30" fill="#0ea5e9" opacity="0.15"/>
    <circle cx="1560" cy="300" r="20" fill="#38bdf8" opacity="0.12"/>
    <circle cx="1250" cy="700" r="15" fill="#7dd3fc" opacity="0.1"/>
  </g>

  <!-- Accent lines — horizontal light beams -->
  <line x1="0" y1="200" x2="960"  y2="200" stroke="#38bdf8" stroke-width="0.6" opacity="0.15"/>
  <line x1="0" y1="880" x2="960"  y2="880" stroke="#38bdf8" stroke-width="0.6" opacity="0.12"/>
  <line x1="960" y1="100" x2="1920" y2="100" stroke="#60a5fa" stroke-width="0.5" opacity="0.1"/>

  <!-- Small data points scattered -->
  <g fill="#38bdf8" opacity="0.35">
    <circle cx="200"  cy="180" r="2"/>
    <circle cx="440"  cy="320" r="1.5"/>
    <circle cx="320"  cy="680" r="2"/>
    <circle cx="680"  cy="200" r="1.5"/>
    <circle cx="760"  cy="750" r="2"/>
    <circle cx="140"  cy="820" r="1.5"/>
    <circle cx="1700" cy="200" r="2"/>
    <circle cx="1820" cy="600" r="1.5"/>
    <circle cx="1640" cy="820" r="2"/>
  </g>

  <!-- PLACEHOLDER label — subtle, bottom right -->
  <text x="1880" y="1060" text-anchor="end"
    font-family="'Barlow Condensed', monospace" font-size="11"
    fill="#38bdf8" fill-opacity="0.2" letter-spacing="3">
    REPLACE WITH hero-3d.jpg
  </text>
</svg>
